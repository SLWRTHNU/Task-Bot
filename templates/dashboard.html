<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ADHD Task Bot — Dashboard</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --surface2: #22222f;
      --border: #2e2e3f;
      --accent: #7c6ff7;
      --accent2: #5eead4;
      --green: #4ade80;
      --yellow: #facc15;
      --orange: #fb923c;
      --red: #f87171;
      --text: #e2e2f0;
      --text-dim: #8888aa;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ── Layout ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 { font-size: 1.25rem; font-weight: 700; }
    header .brain { font-size: 1.5rem; }
    header .badge {
      margin-left: auto;
      background: var(--accent);
      color: white;
      font-size: 0.75rem;
      padding: 2px 10px;
      border-radius: 99px;
      font-weight: 600;
    }

    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 16px;
      display: grid;
      gap: 24px;
    }

    /* ── Stats bar ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 12px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
    }
    .stat-card .value { font-size: 2rem; font-weight: 800; }
    .stat-card .label { font-size: 0.8rem; color: var(--text-dim); margin-top: 2px; }
    .stat-card.pending .value { color: var(--yellow); }
    .stat-card.done .value { color: var(--green); }
    .stat-card.recurring .value { color: var(--accent2); }

    /* ── Add Task Panel ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .panel-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      cursor: pointer;
      user-select: none;
    }
    .panel-header:hover { background: var(--surface2); }
    .panel-body { padding: 20px; }
    .panel-body.collapsed { display: none; }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .form-grid .full { grid-column: 1 / -1; }

    label { display: block; font-size: 0.85rem; color: var(--text-dim); margin-bottom: 4px; }
    input, select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 9px 12px;
      font-size: 0.9rem;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* Time row: hour + minute + ampm inline */
    .time-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .time-row input[type="number"] {
      width: 64px;
      text-align: center;
      padding: 9px 6px;
    }
    .time-row .time-sep {
      color: var(--text-dim);
      font-size: 1.1rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .time-row select {
      width: 76px;
    }

    /* Hide number spinners */
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type="number"] { -moz-appearance: textfield; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      border-radius: 8px;
      border: none;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--accent); color: white; }
    .btn-success { background: var(--green); color: #0a1a10; }
    .btn-warning { background: var(--orange); color: #1a0a00; }
    .btn-danger { background: var(--red); color: #1a0000; }
    .btn-ghost { background: var(--surface2); color: var(--text); }
    .btn:hover { opacity: 0.85; }

    .form-actions { display: flex; gap: 10px; margin-top: 16px; }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-btn {
      padding: 6px 14px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-dim);
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn:hover, .filter-btn.active {
      border-color: var(--accent);
      color: var(--text);
      background: var(--surface2);
    }
    .filter-btn.active { color: var(--accent); }
    .search-input {
      margin-left: auto;
      max-width: 200px;
      padding: 6px 12px;
      font-size: 0.85rem;
    }

    /* ── Task list ── */
    .task-list { display: grid; gap: 10px; }
    .task-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: start;
      transition: border-color 0.2s, opacity 0.3s;
      animation: slideIn 0.25s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .task-card:hover { border-color: var(--accent); }
    .task-card.completed { opacity: 0.5; }

    .task-check {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: none;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .task-check:hover { border-color: var(--green); background: rgba(74,222,128,0.1); }
    .task-check.checked { border-color: var(--green); background: var(--green); }

    .task-body { min-width: 0; }
    .task-title {
      font-weight: 600;
      font-size: 0.95rem;
    }
    .task-title.strikethrough { text-decoration: line-through; color: var(--text-dim); }
    .task-meta { font-size: 0.78rem; color: var(--text-dim); margin-top: 4px; display: flex; flex-wrap: wrap; gap: 8px; }

    .escalation-bar {
      display: flex;
      gap: 3px;
      margin-top: 6px;
    }
    .escalation-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--border);
    }
    .escalation-dot.active { background: var(--accent); }
    .escalation-dot.fired { background: var(--red); }

    .task-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .icon-btn {
      width: 30px;
      height: 30px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      transition: all 0.15s;
    }
    .icon-btn:hover { border-color: var(--accent); color: var(--text); }
    .icon-btn.danger:hover { border-color: var(--red); color: var(--red); }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-dim);
    }
    .empty .emoji { font-size: 3rem; margin-bottom: 12px; }
    .empty h3 { font-size: 1.1rem; margin-bottom: 6px; color: var(--text); }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow);
      animation: modalIn 0.2s ease;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.95) translateY(-10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal-header {
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 700;
      font-size: 1rem;
    }
    .modal-body { padding: 20px; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 0.9rem;
      z-index: 300;
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s;
      max-width: 320px;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.success { border-color: var(--green); }
    #toast.error { border-color: var(--red); }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-grid .full { grid-column: 1; }
      .task-card { grid-template-columns: auto 1fr; }
      .task-actions { grid-column: 1 / -1; }
    }
  </style>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css" />
  <style>
    .flatpickr-calendar { font-family: inherit; }
    .flatpickr-input { cursor: pointer; }
  </style>
</head>
<body>

<header>
  <span class="brain">🧠</span>
  <h1>ADHD Task Bot</h1>
  <span class="badge" id="pending-badge">0 pending</span>
</header>

<main>
  <!-- Stats -->
  <div class="stats" id="stats">
    <div class="stat-card pending">
      <div class="value" id="stat-pending">–</div>
      <div class="label">Pending</div>
    </div>
    <div class="stat-card done">
      <div class="value" id="stat-done">–</div>
      <div class="label">Completed</div>
    </div>
    <div class="stat-card recurring">
      <div class="value" id="stat-recurring">–</div>
      <div class="label">Recurring</div>
    </div>
  </div>

  <!-- Add Task Panel -->
  <div class="panel">
    <div class="panel-header" onclick="toggleAddForm()">
      <span>➕</span>
      <span>Add New Task</span>
      <span id="add-chevron" style="margin-left:auto">▼</span>
    </div>
    <div class="panel-body" id="add-form-body">
      <form id="add-form" onsubmit="submitTask(event)">
        <div class="form-grid">
          <div class="full">
            <label>Task Title *</label>
            <input type="text" id="f-title" placeholder="e.g. Take medication" required />
          </div>

          <div>
            <label>Recurrence</label>
            <select id="f-recurrence" onchange="toggleRecurrence('f')">
              <option value="none">None (one-time)</option>
              <option value="daily">Daily</option>
              <option value="weekly">Weekly</option>
              <option value="monthly">Monthly</option>
              <option value="custom">Custom (every N days)</option>
            </select>
          </div>
          <div id="f-custom-group" style="display:none">
            <label>Every N days</label>
            <input type="number" id="f-interval" value="2" min="1" max="365" />
          </div>

          <div>
            <label>Due Date</label>
            <input type="date" id="f-due-date" />
          </div>
          <div>
            <label>Due Time</label>
            <div class="time-row">
              <input type="number" id="f-hour" min="1" max="12" placeholder="12" />
              <span class="time-sep">:</span>
              <input type="number" id="f-minute" min="0" max="59" placeholder="00" />
              <select id="f-ampm">
                <option value="PM">PM</option>
                <option value="AM">AM</option>
              </select>
            </div>
          </div>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">➕ Add Task</button>
          <button type="button" class="btn btn-ghost" onclick="resetForm()">Clear</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Filter + Tasks -->
  <div>
    <div class="filter-bar" style="margin-bottom:14px">
      <button class="filter-btn active" data-filter="pending" onclick="setFilter('pending',this)">⏳ Pending</button>
      <button class="filter-btn" data-filter="all" onclick="setFilter('all',this)">📋 All</button>
      <button class="filter-btn" data-filter="completed" onclick="setFilter('completed',this)">✅ Done</button>
      <input type="text" class="search-input" placeholder="🔍 Search..." oninput="filterTasks(this.value)" />
    </div>
    <div class="task-list" id="task-list">
      <div class="empty"><div class="emoji">⏳</div><h3>Loading...</h3></div>
    </div>
  </div>
</main>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-modal" onclick="closeEditModal(event)">
  <div class="modal">
    <div class="modal-header">
      <span>✏️ Edit Task</span>
      <button class="icon-btn" onclick="closeEditModalDirect()">✕</button>
    </div>
    <div class="modal-body">
      <form id="edit-form" onsubmit="saveEdit(event)">
        <input type="hidden" id="e-id" />
        <div class="form-grid">
          <div class="full">
            <label>Title</label>
            <input type="text" id="e-title" required />
          </div>

          <div>
            <label>Recurrence</label>
            <select id="e-recurrence" onchange="toggleRecurrence('e')">
              <option value="none">None (one-time)</option>
              <option value="daily">Daily</option>
              <option value="weekly">Weekly</option>
              <option value="monthly">Monthly</option>
              <option value="custom">Custom (every N days)</option>
            </select>
          </div>
          <div id="e-custom-group" style="display:none">
            <label>Every N days</label>
            <input type="number" id="e-interval" value="2" min="1" max="365" />
          </div>

          <div>
            <label>Due Date</label>
            <input type="date" id="e-due-date" />
          </div>
          <div>
            <label>Due Time</label>
            <div class="time-row">
              <input type="number" id="e-hour" min="1" max="12" placeholder="12" />
              <span class="time-sep">:</span>
              <input type="number" id="e-minute" min="0" max="59" placeholder="00" />
              <select id="e-ampm">
                <option value="PM">PM</option>
                <option value="AM">AM</option>
              </select>
            </div>
          </div>
        </div>
        <div class="form-actions" style="margin-top:16px">
          <button type="submit" class="btn btn-primary">💾 Save</button>
          <button type="button" class="btn btn-ghost" onclick="closeEditModalDirect()">Cancel</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Snooze Modal -->
<div class="modal-overlay" id="snooze-modal" onclick="closeSnoozeModal(event)">
  <div class="modal" style="max-width:360px">
    <div class="modal-header">
      <span>😴 Snooze Task</span>
      <button class="icon-btn" onclick="closeSnoozeModalDirect()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="snooze-id" />
      <p style="color:var(--text-dim);margin-bottom:16px">How long to snooze reminders?</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <button class="btn btn-ghost" onclick="doSnooze(15)">15 minutes</button>
        <button class="btn btn-ghost" onclick="doSnooze(30)">30 minutes</button>
        <button class="btn btn-ghost" onclick="doSnooze(60)">1 hour</button>
        <button class="btn btn-ghost" onclick="doSnooze(120)">2 hours</button>
        <button class="btn btn-ghost" onclick="doSnooze(480)">8 hours</button>
        <button class="btn btn-ghost" onclick="doSnooze(1440)">Tomorrow</button>
      </div>
      <div style="margin-top:14px;display:flex;gap:8px;align-items:center">
        <input type="number" id="snooze-custom" placeholder="Custom minutes" min="1"
               style="flex:1" onkeydown="if(event.key==='Enter'){doSnooze(parseInt(this.value))}" />
        <button class="btn btn-primary" onclick="doSnooze(parseInt(document.getElementById('snooze-custom').value))">Snooze</button>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
  let allTasks = [];
  let currentFilter = 'pending';
  let searchQuery = '';

  // ── Init ──────────────────────────────────────────────────────────────────

  document.addEventListener('DOMContentLoaded', () => {
    loadStats();
    loadTasks();
    setDefaultDateTime('f');
    setInterval(() => { loadStats(); loadTasks(); }, 30000);
  });

  function setDefaultDateTime(prefix) {
    const now = new Date();
    now.setHours(now.getHours() + 1, 0, 0, 0); // round to next hour
    const pad = n => String(n).padStart(2, '0');
    const dateStr = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
    document.getElementById(prefix + '-due-date').value = dateStr;
    document.getElementById(prefix + '-hour').value = '';
    document.getElementById(prefix + '-minute').value = '';
  }

  function buildDueDate(prefix) {
    const date = document.getElementById(prefix + '-due-date').value;
    if (!date) return null;
    let hour = parseInt(document.getElementById(prefix + '-hour').value) || 12;
    const minute = parseInt(document.getElementById(prefix + '-minute').value) || 0;
    const ampm = document.getElementById(prefix + '-ampm').value;
    if (ampm === 'PM' && hour !== 12) hour += 12;
    if (ampm === 'AM' && hour === 12) hour = 0;
    const pad = n => String(n).padStart(2, '0');
    return `${date}T${pad(hour)}:${pad(minute)}:00`;
  }

  function setDateTimeFields(prefix, isoStr) {
    if (!isoStr) return;
    // isoStr is a naive local datetime like "2026-03-13T15:00:00"
    const [datePart, timePart] = isoStr.split('T');
    if (!datePart) return;
    document.getElementById(prefix + '-due-date').value = datePart;
    if (timePart) {
      const [hStr, mStr] = timePart.split(':');
      let h = parseInt(hStr) || 0;
      const m = parseInt(mStr) || 0;
      const ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      document.getElementById(prefix + '-hour').value = h;
      document.getElementById(prefix + '-minute').value = m;
      document.getElementById(prefix + '-ampm').value = ampm;
    }
  }

  // ── Recurrence toggle ─────────────────────────────────────────────────────

  function toggleRecurrence(prefix) {
    const v = document.getElementById(prefix + '-recurrence').value;
    document.getElementById(prefix + '-custom-group').style.display =
      v === 'custom' ? 'block' : 'none';
  }

  // ── Data Loading ──────────────────────────────────────────────────────────

  async function loadStats() {
    try {
      const r = await fetch('/api/stats');
      const data = await r.json();
      document.getElementById('stat-pending').textContent = data.pending;
      document.getElementById('stat-done').textContent = data.completed;
      document.getElementById('stat-recurring').textContent = data.recurring;
      document.getElementById('pending-badge').textContent = `${data.pending} pending`;
    } catch(e) { console.error('Stats error:', e); }
  }

  async function loadTasks() {
    try {
      const r = await fetch('/api/tasks');
      const data = await r.json();
      allTasks = data.tasks;
      renderTasks();
    } catch(e) {
      console.error('Load error:', e);
      document.getElementById('task-list').innerHTML =
        '<div class="empty"><div class="emoji">❌</div><h3>Failed to load tasks</h3></div>';
    }
  }

  function setFilter(f, el) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    renderTasks();
  }

  function filterTasks(q) {
    searchQuery = q.toLowerCase();
    renderTasks();
  }

  function renderTasks() {
    let tasks = allTasks;
    if (currentFilter === 'pending') tasks = tasks.filter(t => t.status === 'pending');
    else if (currentFilter === 'completed') tasks = tasks.filter(t => t.status === 'completed');
    if (searchQuery) {
      tasks = tasks.filter(t => t.title.toLowerCase().includes(searchQuery));
    }

    const container = document.getElementById('task-list');
    if (tasks.length === 0) {
      container.innerHTML = `<div class="empty">
        <div class="emoji">${currentFilter === 'completed' ? '📭' : '🎉'}</div>
        <h3>${currentFilter === 'completed' ? 'No completed tasks yet' : 'All clear! No pending tasks.'}</h3>
        <p style="margin-top:8px;font-size:0.9rem">
          ${currentFilter === 'pending' ? 'Add a task above to get started.' : ''}
        </p>
      </div>`;
      return;
    }
    container.innerHTML = tasks.map(renderTaskCard).join('');
  }

  function renderTaskCard(t) {
    const isDone = t.status === 'completed';
    const currentLevel = t.current_escalation_level || 0;

    const dots = Array.from({length: 5}, (_, i) => {
      const cls = i < currentLevel ? 'escalation-dot fired' :
                  i === currentLevel ? 'escalation-dot active' : 'escalation-dot';
      return `<div class="${cls}" title="Level ${i+1}"></div>`;
    }).join('');

    let metaParts = [];
    if (t.due_date) {
      try {
        // Parse naive local datetime string directly
        const d = parseLocalDate(t.due_date);
        const isOverdue = !isDone && d < new Date();
        metaParts.push(`<span style="color:${isOverdue ? 'var(--red)' : ''}">📅 ${formatDate(d)}</span>`);
      } catch(e) {}
    }
    if (t.recurrence && t.recurrence !== 'none') {
      const interval = t.recurrence_interval > 1 ? ` every ${t.recurrence_interval}` : '';
      metaParts.push(`🔁 ${t.recurrence}${interval}`);
    }
    if (t.snoozed_until && parseLocalDate(t.snoozed_until) > new Date()) {
      metaParts.push(`😴 snoozed until ${formatDate(parseLocalDate(t.snoozed_until))}`);
    }

    return `
    <div class="task-card ${isDone ? 'completed' : ''}" id="task-${t.id}">
      <button class="task-check ${isDone ? 'checked' : ''}" onclick="completeTask(${t.id})" title="Mark complete">
        ${isDone ? '✓' : ''}
      </button>
      <div class="task-body">
        <div class="task-title ${isDone ? 'strikethrough' : ''}">${escHtml(t.title)}</div>
        <div class="task-meta">${metaParts.join(' · ')}</div>
        ${!isDone ? `<div class="escalation-bar" title="Reminder escalation level">${dots}</div>` : ''}
      </div>
      <div class="task-actions">
        ${!isDone ? `<button class="icon-btn" onclick="openSnooze(${t.id})" title="Snooze">😴</button>` : ''}
        <button class="icon-btn" onclick="openEdit(${t.id})" title="Edit">✏️</button>
        <button class="icon-btn danger" onclick="deleteTask(${t.id})" title="Delete">🗑️</button>
      </div>
    </div>`;
  }

  // Parse a naive local ISO datetime string without applying UTC offset
  function parseLocalDate(s) {
    if (!s) return new Date(NaN);
    // "2026-03-13T15:00:00" → treat as local time
    const [date, time] = s.split('T');
    const [y, mo, d] = date.split('-').map(Number);
    const [h, m, sec] = (time || '00:00:00').split(':').map(Number);
    return new Date(y, mo - 1, d, h || 0, m || 0, sec || 0);
  }

  function formatDate(d) {
    const now = new Date();
    const diff = d - now;
    if (Math.abs(diff) < 60000) return 'just now';
    if (diff > 0 && diff < 86400000) return `in ${Math.round(diff/60000)}m`;
    if (diff < 0 && diff > -86400000) return `${Math.round(-diff/60000)}m ago`;
    return d.toLocaleDateString(undefined, {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Task Actions ──────────────────────────────────────────────────────────

  async function completeTask(id) {
    try {
      const r = await fetch(`/api/tasks/${id}/complete`, {method:'POST'});
      const data = await r.json();
      toast('🎉 ' + data.message, 'success');
      loadTasks(); loadStats();
    } catch(e) { toast('Failed to complete task', 'error'); }
  }

  async function deleteTask(id) {
    const task = allTasks.find(t => t.id === id);
    if (!confirm(`Delete "${task?.title}"?`)) return;
    try {
      await fetch(`/api/tasks/${id}`, {method:'DELETE'});
      toast('🗑️ Task deleted', 'success');
      loadTasks(); loadStats();
    } catch(e) { toast('Failed to delete task', 'error'); }
  }

  // ── Add Task Form ─────────────────────────────────────────────────────────

  function toggleAddForm() {
    const body = document.getElementById('add-form-body');
    const chevron = document.getElementById('add-chevron');
    const collapsed = body.classList.toggle('collapsed');
    chevron.textContent = collapsed ? '▶' : '▼';
  }

  function resetForm() {
    document.getElementById('add-form').reset();
    document.getElementById('f-custom-group').style.display = 'none';
    setDefaultDateTime('f');
  }

  async function submitTask(e) {
    e.preventDefault();
    const due_date = buildDueDate('f');
    const rec = document.getElementById('f-recurrence').value;
    const isCustom = rec === 'custom';

    const payload = {
      title: document.getElementById('f-title').value.trim(),
      recurrence: isCustom ? 'daily' : rec,
      recurrence_interval: isCustom ? (parseInt(document.getElementById('f-interval').value) || 2) : 1,
      due_date: due_date,
      reminder_start: due_date,
    };

    try {
      const r = await fetch('/api/tasks', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(payload),
      });
      if (!r.ok) throw new Error(await r.text());
      toast('✅ Task created!', 'success');
      resetForm();
      loadTasks(); loadStats();
    } catch(e) {
      toast('Failed to create task: ' + e.message, 'error');
    }
  }

  // ── Edit Modal ────────────────────────────────────────────────────────────

  function openEdit(id) {
    const t = allTasks.find(t => t.id === id);
    if (!t) return;
    document.getElementById('e-id').value = t.id;
    document.getElementById('e-title').value = t.title;

    // Recurrence: if daily with interval > 1, show as custom
    const rec = t.recurrence || 'none';
    const interval = t.recurrence_interval || 1;
    if (rec === 'daily' && interval > 1) {
      document.getElementById('e-recurrence').value = 'custom';
      document.getElementById('e-interval').value = interval;
      document.getElementById('e-custom-group').style.display = 'block';
    } else {
      document.getElementById('e-recurrence').value = rec;
      document.getElementById('e-interval').value = interval;
      document.getElementById('e-custom-group').style.display = 'none';
    }

    setDateTimeFields('e', t.due_date || t.reminder_start || '');
    document.getElementById('edit-modal').classList.add('open');
  }

  function closeEditModal(e) {
    if (e.target === document.getElementById('edit-modal')) closeEditModalDirect();
  }
  function closeEditModalDirect() {
    document.getElementById('edit-modal').classList.remove('open');
  }

  async function saveEdit(e) {
    e.preventDefault();
    const id = document.getElementById('e-id').value;
    const due_date = buildDueDate('e');
    const rec = document.getElementById('e-recurrence').value;
    const isCustom = rec === 'custom';

    const payload = {
      title: document.getElementById('e-title').value.trim(),
      recurrence: isCustom ? 'daily' : rec,
      recurrence_interval: isCustom ? (parseInt(document.getElementById('e-interval').value) || 2) : 1,
      due_date: due_date,
      reminder_start: due_date,
    };

    try {
      const r = await fetch(`/api/tasks/${id}`, {
        method: 'PUT',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(payload),
      });
      if (!r.ok) throw new Error(await r.text());
      toast('💾 Task updated!', 'success');
      closeEditModalDirect();
      loadTasks();
    } catch(err) {
      toast('Failed to update: ' + err.message, 'error');
    }
  }

  // ── Snooze Modal ──────────────────────────────────────────────────────────

  function openSnooze(id) {
    document.getElementById('snooze-id').value = id;
    document.getElementById('snooze-custom').value = '';
    document.getElementById('snooze-modal').classList.add('open');
  }

  function closeSnoozeModal(e) {
    if (e.target === document.getElementById('snooze-modal')) closeSnoozeModalDirect();
  }
  function closeSnoozeModalDirect() {
    document.getElementById('snooze-modal').classList.remove('open');
  }

  async function doSnooze(minutes) {
    if (!minutes || isNaN(minutes) || minutes < 1) {
      toast('Enter a valid snooze duration', 'error');
      return;
    }
    const id = document.getElementById('snooze-id').value;
    try {
      const r = await fetch(`/api/tasks/${id}/snooze`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({minutes}),
      });
      if (!r.ok) throw new Error(await r.text());
      toast(`😴 Snoozed for ${minutes} minutes`, 'success');
      closeSnoozeModalDirect();
      loadTasks();
    } catch(err) {
      toast('Failed to snooze: ' + err.message, 'error');
    }
  }

  // ── Toast ─────────────────────────────────────────────────────────────────

  let toastTimer;
  function toast(msg, type='success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = ''; }, 3000);
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
  const fpConfig = { dateFormat: 'Y-m-d', disableMobile: false };
  flatpickr('#f-due-date', fpConfig);
  flatpickr('#e-due-date', fpConfig);
</script>
</body>
